<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voice UI — ChatMe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #00e5ff;
    --danger: #ff4757;
    --success: #2ecc71;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 22px; height: 22px; fill: white; }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--muted);
    font-size: 14px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Fields */
  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  .field .hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .select-wrap { position: relative; }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 12px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .status-dot.connecting { background: #f39c12; animation: blink 0.8s infinite; }
  .status-dot.error { background: var(--danger); }

  .status-text { color: var(--muted); }
  .status-text span { color: var(--text); font-weight: 700; }

  /* Visualizer */
  .visualizer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .visualizer.active { opacity: 1; }

  .bar {
    width: 3px;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    border-radius: 2px;
    height: 4px;
    transition: height 0.1s;
  }

  /* Start button */
  .btn-start {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.05em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--accent) 0%, #4e46e5 100%);
    color: white;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 24px rgba(108,99,255,0.35);
  }

  .btn-start:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(108,99,255,0.5);
  }

  .btn-start:active:not(:disabled) { transform: translateY(0); }

  .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-start.active {
    background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
    box-shadow: 0 4px 24px rgba(255,71,87,0.35);
  }

  .btn-start .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-icon { width: 20px; height: 20px; transition: transform 0.3s; }

  /* Chat log */
  .chat-log {
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    font-family: var(--font-mono);
    max-width: 85%;
    animation: msgIn 0.3s ease;
  }

  .message.user {
    background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(78,70,229,0.1));
    border: 1px solid rgba(108,99,255,0.3);
    align-self: flex-end;
  }

  .message.bot {
    background: var(--surface2);
    border: 1px solid var(--border);
    align-self: flex-start;
  }

  .message.system {
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    align-self: center;
    font-size: 11px;
    color: var(--accent2);
    text-align: center;
    max-width: 100%;
  }

  .msg-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    opacity: 0.6;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 32px 0;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .footer a { color: var(--accent2); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--danger);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    z-index: 100;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--success); }
    50%       { box-shadow: 0 0 16px var(--success); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  @keyframes barAnim {
    0%, 100% { height: 4px; }
    50%       { height: 28px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm6 10a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93V21H8v2h8v-2h-3v-2.07A8 8 0 0 0 20 11h-2z"/></svg>
      </div>
      <h1>Voice UI</h1>
    </div>
    <p>chatme.ai — voice bot testing interface</p>
  </div>

  <!-- Settings toggle -->
  <div style="text-align:right; margin-bottom:12px;">
    <button onclick="toggleSettings()" id="settingsToggle" style="background:none;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 0;transition:color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
      <svg id="settingsArrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform 0.3s;transform:rotate(0deg)"><path d="m6 9 6 6 6-6"/></svg>
      Settings
    </button>
  </div>

  <!-- Config card (hidden by default) -->
  <div class="card" id="configCard" style="display:none; margin-bottom:16px;">
    <div class="card-title">Connection</div>

    <div class="field">
      <label>WebSocket Endpoint</label>
      <input type="text" id="endpoint" value="admin.chatme.ai" placeholder="wss://..."/>
      <div class="hint">Default: admin.chatme.ai</div>
    </div>

    <div class="field">
      <label>Bot Token</label>
      <input type="password" id="botToken" value="439e04c6aeacd25c3cdffbc6c9a30b787fb49ef41afc6c84135af523b4a7dc02"/>
    </div>

    <div class="field">
      <label>Microphone</label>
      <div class="select-wrap">
        <select id="micSelect">
          <option value="">System Default</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Status + visualizer -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text">Status: <span id="statusText">Ready</span></div>
  </div>

  <div class="visualizer" id="visualizer">
    <!-- bars injected by JS -->
  </div>

  <!-- Start button -->
  <button class="btn-start" id="startBtn" onclick="toggleSession()">
    <div class="btn-inner">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path id="btnIcon" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm6 10a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93V21H8v2h8v-2h-3v-2.07A8 8 0 0 0 20 11h-2z"/>
      </svg>
      <span id="btnLabel">Start</span>
    </div>
  </button>

  <!-- Chat log -->
  <div class="card" style="margin-top:16px;">
    <div class="card-title">Session Log</div>
    <div class="chat-log" id="chatLog">
      <div class="empty-state">No messages yet. Press Start to begin.</div>
    </div>
  </div>

 

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── Settings toggle ──────────────────────────────────────────────────────
  function toggleSettings() {
    const card = document.getElementById('configCard');
    const arrow = document.getElementById('settingsArrow');
    const open = card.style.display === 'none';
    card.style.display = open ? 'block' : 'none';
    arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  }

  // ─── State ────────────────────────────────────────────────────────────────
  let ws = null;
  let isActive = false;
  let firstMessage = true;
  let sessionUserId = null;

  // Audio recording
  let mediaStream = null;
  let audioCtx = null;
  let analyser = null;
  let animFrame = null;
  let scriptProcessor = null;
  let micSource = null;

  // Audio playback queue
  let playbackCtx = null;
  let playbackQueue = [];
  let isPlaying = false;

  // Sample rate for Linear16 (must match API)
  const SAMPLE_RATE = 16000;
  const NUM_BARS = 32;

  // ─── Visualizer setup ─────────────────────────────────────────────────────
  const vizEl = document.getElementById('visualizer');
  for (let i = 0; i < NUM_BARS; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    vizEl.appendChild(b);
  }
  const bars = vizEl.querySelectorAll('.bar');

  // ─── Microphone enumeration ───────────────────────────────────────────────
  async function populateMics() {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      const devices = await navigator.mediaDevices.enumerateDevices();
      const sel = document.getElementById('micSelect');
      sel.innerHTML = '<option value="">System Default</option>';
      devices.filter(d => d.kind === 'audioinput').forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || 'Microphone ' + sel.options.length;
        sel.appendChild(opt);
      });
    } catch (e) {}
  }
  populateMics();

  // ─── UI helpers ───────────────────────────────────────────────────────────
  function setStatus(state, text) {
    document.getElementById('statusDot').className = 'status-dot ' + state;
    document.getElementById('statusText').textContent = text;
  }

  function showToast(msg, dur = 4000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function addMessage(role, text) {
    const log = document.getElementById('chatLog');
    if (firstMessage) { log.innerHTML = ''; firstMessage = false; }
    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;
    if (role !== 'system') {
      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = role === 'user' ? 'You' : 'Bot';
      wrap.appendChild(lbl);
    }
    const txt = document.createElement('div');
    txt.textContent = text;
    wrap.appendChild(txt);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function setButtonActive(active) {
    const btn = document.getElementById('startBtn');
    const lbl = document.getElementById('btnLabel');
    btn.classList.toggle('active', active);
    lbl.textContent = active ? 'Stop' : 'Start';
  }

  // ─── Visualizer ───────────────────────────────────────────────────────────
  function startVisualizer(stream) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();
    analyser.fftSize = 64;
    ctx.createMediaStreamSource(stream).connect(analyser);
    vizEl.classList.add('active');
    drawBars();
  }

  function drawBars() {
    animFrame = requestAnimationFrame(drawBars);
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    bars.forEach((b, i) => {
      b.style.height = Math.max(4, (data[i] || 0) / 255 * 36) + 'px';
    });
  }

  function stopVisualizer() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    bars.forEach(b => b.style.height = '4px');
    vizEl.classList.remove('active');
  }

  // ─── Audio helpers ────────────────────────────────────────────────────────
  // Convert Float32 PCM → Linear16 → Base64
  function float32ToBase64Linear16(float32Array) {
    const int16 = new Int16Array(float32Array.length);
    for (let i = 0; i < float32Array.length; i++) {
      const s = Math.max(-1, Math.min(1, float32Array[i]));
      int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    const bytes = new Uint8Array(int16.buffer);
    let binary = '';
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  // Decode Base64 Linear16 → Float32 and play it
  async function playAudioBase64(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const int16 = new Int16Array(bytes.buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

    if (!playbackCtx) playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

    const buffer = playbackCtx.createBuffer(1, float32.length, SAMPLE_RATE);
    buffer.copyToChannel(float32, 0);
    playbackQueue.push(buffer);
    if (!isPlaying) drainQueue();
  }

  function drainQueue() {
    if (!playbackQueue.length) { isPlaying = false; return; }
    isPlaying = true;
    const buf = playbackQueue.shift();
    const src = playbackCtx.createBufferSource();
    src.buffer = buf;
    src.connect(playbackCtx.destination);
    src.onended = drainQueue;
    src.start();
  }

  // ─── WebSocket v2 protocol ────────────────────────────────────────────────
  function wsSend(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  function connectWS(host, apiKey) {
    // Build v2 endpoint URL
    let url = host.trim();
    if (!url.startsWith('ws://') && !url.startsWith('wss://')) url = 'wss://' + url;
    // Remove trailing slash then append v2 path
    url = url.replace(/\/$/, '') + '/api/voice/v2/user-stt-bot-tts/stream';

    sessionUserId = 'user_' + Math.random().toString(36).slice(2, 10);
    setStatus('connecting', 'Connecting…');

    ws = new WebSocket(url);

    ws.onopen = () => {
      addMessage('system', '✓ WebSocket connected');

      // Step 1: send open frame with api_key
      wsSend({ kind: 'open', api_key: apiKey });
    };

    ws.onmessage = (ev) => {
      let frames;
      try { frames = JSON.parse(ev.data); } catch { return; }
      if (!Array.isArray(frames)) frames = [frames];

      frames.forEach(frame => {
        switch (frame.kind) {

          case 'opened':
            // Step 2: open confirmed → start user session
            setStatus('connected', 'Connected');
            addMessage('system', '✓ Session opened — starting user session');
            wsSend({
              kind: 'start_session',
              user_id: sessionUserId,
              stt: { sample_rate: SAMPLE_RATE },
              tts: { sample_rate: SAMPLE_RATE }
            });
            break;

          case 'session_started':
            addMessage('system', '✓ Ready — speak now!');
            // Step 3: now start sending microphone audio
            startMic();
            break;

          case 'user_text':
            // STT recognised what the user said
            addMessage('user', frame.text);
            break;

          case 'bot_text':
            // Bot text reply
            addMessage('bot', frame.text);
            break;

          case 'bot_audio':
            // Bot audio reply — play it
            if (frame.audio) playAudioBase64(frame.audio);
            break;

          case 'session_ended':
            addMessage('system', '○ User session ended');
            break;

          case 'closed':
            addMessage('system', '○ Stream closed' + (frame.reason ? ': ' + frame.reason : ''));
            if (isActive) stopSession();
            break;

          case 'error':
            addMessage('system', '✗ Error: ' + (frame.message || 'unknown'));
            showToast('API error: ' + (frame.message || 'unknown'));
            break;

          default:
            // unknown frame — ignore safely
            break;
        }
      });
    };

    ws.onerror = () => {
      setStatus('error', 'Error');
      showToast('WebSocket connection error — check endpoint & token');
    };

    ws.onclose = () => {
      if (isActive) {
        setStatus('', 'Disconnected');
        addMessage('system', '⚠ Connection closed');
        stopSession();
      }
    };
  }

  // ─── Microphone capture → send Linear16 base64 audio frames ──────────────
  async function startMic() {
    try {
      const deviceId = document.getElementById('micSelect').value;
      const constraints = {
        audio: {
          sampleRate: SAMPLE_RATE,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          ...(deviceId ? { deviceId: { exact: deviceId } } : {})
        }
      };
      mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
      startVisualizer(mediaStream);

      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
      micSource = audioCtx.createMediaStreamSource(mediaStream);

      // ScriptProcessor to get raw PCM chunks
      scriptProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
      scriptProcessor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const pcm = e.inputBuffer.getChannelData(0);
        const b64 = float32ToBase64Linear16(pcm);
        wsSend({ kind: 'user_audio', user_id: sessionUserId, audio: b64 });
      };
      micSource.connect(scriptProcessor);
      scriptProcessor.connect(audioCtx.destination);

    } catch (err) {
      showToast('Microphone error: ' + err.message);
      stopSession();
    }
  }

  function stopMic() {
    if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
    if (micSource) { micSource.disconnect(); micSource = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    stopVisualizer();
  }

  // ─── Session toggle ───────────────────────────────────────────────────────
  async function toggleSession() {
    isActive ? stopSession() : await startSession();
  }

  async function startSession() {
    const host  = document.getElementById('endpoint').value.trim();
    const token = document.getElementById('botToken').value.trim();
    if (!host)  { showToast('Please enter a WebSocket endpoint'); return; }
    if (!token) { showToast('Please enter a bot token'); return; }

    isActive = true;
    setButtonActive(true);
    playbackQueue = [];
    isPlaying = false;

    connectWS(host, token);
    // mic is started AFTER session_started frame is received from server
  }

  function stopSession() {
    isActive = false;
    setButtonActive(false);
    stopMic();

    // Gracefully close v2 session & connection
    if (ws && ws.readyState === WebSocket.OPEN) {
      if (sessionUserId) wsSend({ kind: 'end_session', user_id: sessionUserId });
      wsSend({ kind: 'close' });
      ws.close();
    }
    ws = null;
    sessionUserId = null;
    setStatus('', 'Ready');
    addMessage('system', '○ Session ended');
  }
</script>
</body>
</html>
